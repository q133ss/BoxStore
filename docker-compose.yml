services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: boxstore_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - boxstore
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:1.27-alpine
    container_name: boxstore_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - boxstore
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: boxstore_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: boxstore
      MYSQL_USER: boxstore
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - boxstore

  redis:
    image: redis:7.4-alpine
    container_name: boxstore_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - boxstore

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: boxstore_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8081:80"
    networks:
      - boxstore
    depends_on:
      - mysql

networks:
  boxstore:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
